name: 每日更新台股資料

on:
  schedule:
    # 每週一～五 09:00 UTC（台北 17:00，收盤＋法人資料皆已公布）
    - cron: '0 9 * * 1-5'
  workflow_dispatch:        # 也可在 Actions 頁面手動執行

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓取並計算指標
        run: node scripts/fetch-data.js

      - name: 提交 data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "資料無變動，略過提交"
          else
            git commit -m "chore: 自動更新台股資料 $(date -u +%Y-%m-%d)"
            git push
          fi
